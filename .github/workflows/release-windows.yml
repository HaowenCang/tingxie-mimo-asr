name: Windows Release Candidate

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        run: npm run dist -- --publish never

      - name: Create SHA-256 manifest
        shell: pwsh
        run: |
          Get-ChildItem release\Tingxie-*-Setup.exe | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash
            "$hash  $($_.Name)" | Add-Content -Encoding ascii release\SHA256SUMS.txt
          }

      - name: Upload release candidate
        uses: actions/upload-artifact@v7
        with:
          name: tingxie-windows-${{ github.ref_name }}
          path: |
            release/Tingxie-*-Setup.exe
            release/SHA256SUMS.txt
            release/win-unpacked/**
          if-no-files-found: error
          retention-days: 14
