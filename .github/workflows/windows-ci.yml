name: Windows CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: windows-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build production application
        run: npm run build

      - name: Upload production bundles
        uses: actions/upload-artifact@v7
        with:
          name: windows-production-bundles
          path: |
            dist
            dist-electron
          if-no-files-found: error
          retention-days: 7
